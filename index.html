<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Vector Brush</title>
<script>
// Stub globals so inline oninput/onclick handlers never throw "uninitialized"
// before the main deferred script runs. The real objects are assigned below.
var B={size:8,opacity:1,smooth:8,stabilize:6,pressure:'flat',color:'#1a1a2e'};
function sv(id,v){var el=document.getElementById('v-'+id);if(el)el.textContent=v;}
function setMode(m){if(window._setMode)window._setMode(m);}
function setColor(c){if(window._setColor)window._setColor(c);}
function undo(){if(window._undo)window._undo();}
function redo(){if(window._redo)window._redo();}
function clearAll(){if(window._clearAll)window._clearAll();}
function exportSVG(){if(window._exportSVG)window._exportSVG();}
function toggleBg(){if(window._toggleBg)window._toggleBg();}
function delStroke(i,e){if(window._delStroke)window._delStroke(i,e);}
</script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0e0e12;--surface:#16161c;--surface2:#1e1e26;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.15);
  --text:#ddddf0;--muted:#666680;
  --accent:#5b7cf6;--accent2:#8fa4ff;
  --red:#e24b4a;--green:#1d9e75;
  --panel:236px;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'SF Mono','Fira Code',monospace;font-size:11px;overflow:hidden;user-select:none}
#app{display:flex;height:100vh}
#panel{width:var(--panel);min-width:var(--panel);background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
#logo{padding:13px 12px 11px;font-size:12px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--accent2);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:7px}
.sec{padding:11px 12px;border-bottom:1px solid var(--border)}
.sec-title{font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);margin-bottom:9px}
.mode-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px}
.mbtn{padding:6px 4px;background:transparent;border:1px solid var(--border);border-radius:5px;color:var(--muted);font-family:inherit;font-size:10px;cursor:pointer;transition:all .12s;display:flex;align-items:center;justify-content:center;gap:4px}
.mbtn:hover{border-color:var(--border2);color:var(--text)}
.mbtn.on{background:var(--accent);border-color:var(--accent);color:#fff}
.sr{margin-bottom:9px}
.sl{display:flex;justify-content:space-between;margin-bottom:4px}
.sn{color:var(--muted)}
.sv{color:var(--accent2);font-weight:700;min-width:26px;text-align:right}
input[type=range]{-webkit-appearance:none;width:100%;height:3px;background:rgba(255,255,255,0.08);border-radius:99px;outline:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:13px;height:13px;border-radius:50%;background:var(--accent);border:2px solid var(--bg);cursor:pointer}
.crow{display:flex;flex-wrap:wrap;gap:5px}
.cs{width:20px;height:20px;border-radius:50%;border:2px solid transparent;cursor:pointer;transition:transform .1s}
.cs:hover{transform:scale(1.15)}
.cs.on{border-color:#fff}
#cpwrap{width:20px;height:20px;border-radius:50%;border:1.5px dashed var(--border2);display:flex;align-items:center;justify-content:center;cursor:pointer;position:relative;overflow:hidden}
#cpwrap:hover{border-color:var(--accent)}
#cp{position:absolute;opacity:0;width:200%;height:200%;top:-50%;left:-50%;cursor:pointer}
.agrid{display:grid;grid-template-columns:1fr 1fr;gap:4px}
.abtn{padding:7px;background:transparent;border:1px solid var(--border);border-radius:5px;color:var(--muted);font-family:inherit;font-size:10px;cursor:pointer;transition:all .12s;text-align:center}
.abtn:hover{border-color:var(--border2);color:var(--text)}
.abtn.red:hover{border-color:var(--red);color:var(--red)}
.abtn.grn:hover{border-color:var(--green);color:var(--green)}
#slist{flex:1;overflow-y:auto;padding:4px 0}
#sempty{padding:18px 12px;color:var(--muted);text-align:center;line-height:1.9}
.si{display:flex;align-items:center;gap:7px;padding:5px 12px;cursor:pointer;transition:background .1s}
.si:hover{background:rgba(255,255,255,0.04)}
.si.on{background:rgba(91,124,246,0.12)}
.sdot{border-radius:50%;flex-shrink:0}
.smeta{color:var(--muted);font-size:10px;flex:1}
.sdel{background:none;border:none;color:var(--muted);cursor:pointer;padding:0 2px;font-size:14px;opacity:0;line-height:1}
.si:hover .sdel{opacity:1}
.sdel:hover{color:var(--red)}
#cwrap{flex:1;position:relative;overflow:hidden;background:#f5f5f0}
#cwrap.dark{background:#111}
canvas{position:absolute;top:0;left:0;display:block}
#oc{pointer-events:none}
#bar{position:absolute;bottom:0;left:0;right:0;height:26px;background:rgba(14,14,18,.85);backdrop-filter:blur(8px);border-top:1px solid var(--border);display:flex;align-items:center;padding:0 12px;gap:14px;font-size:10px;color:var(--muted);z-index:5}
.bstat strong{color:var(--text)}
#btip{margin-left:auto;font-style:italic}
#bgbtn{position:absolute;top:10px;right:10px;background:rgba(0,0,0,.3);border:1px solid var(--border);border-radius:99px;padding:3px 9px;color:var(--muted);font-size:10px;cursor:pointer;font-family:inherit;z-index:6}
#bgbtn:hover{color:var(--text)}
#ehint{position:absolute;top:10px;left:50%;transform:translateX(-50%);background:rgba(14,14,18,.9);border:1px solid var(--border2);border-radius:6px;padding:5px 12px;font-size:10px;color:var(--accent2);pointer-events:none;opacity:0;transition:opacity .3s;z-index:7;white-space:nowrap}
#ehint.show{opacity:1}
</style>
</head>
<body>
<div id="app">
<div id="panel">
  <div id="logo">
    <svg width="15" height="15" viewBox="0 0 15 15" fill="none">
      <path d="M1 12 C4 5 7 10 10 5 C12 2 14 3 14 3" stroke="#8fa4ff" stroke-width="2" stroke-linecap="round" fill="none"/>
    </svg>
    VectorBrush
  </div>
  <div class="sec">
    <div class="sec-title">Mode</div>
    <div class="mode-grid">
      <button class="mbtn on" id="m-draw"   onclick="setMode('draw')">✏ Draw</button>
      <button class="mbtn"    id="m-edit"   onclick="setMode('edit')">◎ Edit Pts</button>
      <button class="mbtn"    id="m-select" onclick="setMode('select')">▷ Select</button>
      <button class="mbtn"    id="m-erase"  onclick="setMode('erase')">◻ Erase</button>
    </div>
  </div>
  <div class="sec">
    <div class="sec-title">Brush</div>
    <div class="sr">
      <div class="sl"><span class="sn">Size</span><span class="sv" id="v-sz">8</span></div>
      <input type="range" min="1" max="80" value="8" id="r-sz" oninput="B.size=+this.value;sv('sz',this.value)">
    </div>
    <div class="sr">
      <div class="sl"><span class="sn">Opacity</span><span class="sv" id="v-op">100%</span></div>
      <input type="range" min="5" max="100" value="100" id="r-op" oninput="B.opacity=this.value/100;sv('op',this.value+'%')">
    </div>
    <div class="sr" style="margin-bottom:0">
      <div class="sl"><span class="sn">Profile</span><span class="sv" id="v-pr">flat</span></div>
      <input type="range" min="0" max="2" value="0" step="1" id="r-pr" oninput="B.pressure=['flat','taper','swell'][+this.value];sv('pr',B.pressure)">
    </div>
  </div>
  <div class="sec">
    <div class="sec-title">Smoothing</div>
    <div class="sr">
      <div class="sl"><span class="sn">Smooth</span><span class="sv" id="v-sm">8</span></div>
      <input type="range" min="1" max="30" value="8" id="r-sm" oninput="B.smooth=+this.value;sv('sm',this.value)">
    </div>
    <div class="sr" style="margin-bottom:0">
      <div class="sl"><span class="sn">Stabilize</span><span class="sv" id="v-st">6</span></div>
      <input type="range" min="0" max="30" value="6" id="r-st" oninput="B.stabilize=+this.value;sv('st',this.value)">
    </div>
  </div>
  <div class="sec">
    <div class="sec-title">Color</div>
    <div class="crow" id="presets"></div>
    <div style="display:flex;align-items:center;gap:7px;margin-top:8px">
      <div id="cpwrap"><span style="font-size:13px;color:var(--muted);pointer-events:none">+</span><input type="color" id="cp" value="#1a1a2e" oninput="setColor(this.value)"></div>
      <span id="hexlbl" style="color:var(--accent2)">#1a1a2e</span>
    </div>
  </div>
  <div class="sec">
    <div class="sec-title">Actions</div>
    <div class="agrid">
      <button class="abtn" onclick="undo()">↩ Undo</button>
      <button class="abtn" onclick="redo()">↪ Redo</button>
      <button class="abtn grn" onclick="exportSVG()">⬇ SVG</button>
      <button class="abtn red" onclick="clearAll()">✕ Clear</button>
    </div>
  </div>
  <div style="padding:9px 12px 3px"><div class="sec-title">Strokes</div></div>
  <div id="slist"><div id="sempty">No strokes yet.<br>Start drawing.</div></div>
</div>

<div id="cwrap">
  <canvas id="mc"></canvas>
  <canvas id="oc"></canvas>
  <button id="bgbtn" onclick="toggleBg()">bg</button>
  <div id="ehint"></div>
  <div id="bar">
    <div class="bstat">mode: <strong id="b-mode">draw</strong></div>
    <div class="bstat">strokes: <strong id="b-count">0</strong></div>
    <div class="bstat">selected: <strong id="b-sel">—</strong></div>
    <div id="btip">d=draw e=edit s=select x=erase · ctrl+z undo · del remove</div>
  </div>
</div>
</div>

<script>
// ── Canvas setup ─────────────────────────────────────────────────
const mc=document.getElementById('mc');
const oc=document.getElementById('oc');
const mctx=mc.getContext('2d');
const octx=oc.getContext('2d');
const cwrap=document.getElementById('cwrap');

function resize(){
  const r=cwrap.getBoundingClientRect();
  mc.width=oc.width=r.width;
  mc.height=oc.height=r.height;
  redrawAll();
}
resize();
new ResizeObserver(resize).observe(cwrap);

// ── Brush state ───────────────────────────────────────────────────
const B={size:8,opacity:1,smooth:8,stabilize:6,pressure:'flat',color:'#1a1a2e'};

let strokes=[], redoStack=[];
let mode='draw', darkBg=false;

// draw
let isDrawing=false, rawPts=[], stabBuf=[];

// edit/select
let selIdx=-1, selPt=-1, isDragging=false;

// ── Color ─────────────────────────────────────────────────────────
const PALETTE=['#1a1a2e','#f0f0f0','#e24b4a','#5b7cf6','#1d9e75','#ef9f27','#d4537e','#5dcaa5','#e8c547','#7b61ff'];
(function buildPalette(){
  const row=document.getElementById('presets');
  PALETTE.forEach(c=>{
    const d=document.createElement('div');
    d.className='cs';
    d.style.background=c;
    if(c==='#f0f0f0') d.style.border='2px solid rgba(255,255,255,0.22)';
    d.onclick=()=>setColor(c);
    row.appendChild(d);
  });
})();
function setColor(c){
  B.color=c;
  document.getElementById('hexlbl').textContent=c;
  document.getElementById('cp').value=c;
  document.querySelectorAll('.cs').forEach((el,i)=>el.classList.toggle('on',PALETTE[i]===c));
}
setColor('#1a1a2e');
function sv(id,v){document.getElementById('v-'+id).textContent=v;}

// ── Math ──────────────────────────────────────────────────────────
// Ramer-Douglas-Peucker
function rdp(pts,eps){
  if(pts.length<3) return pts.slice();
  const [a,b]=[pts[0],pts[pts.length-1]];
  let maxD=0,idx=0;
  for(let i=1;i<pts.length-1;i++){
    const d=ptLineDist(pts[i],a,b);
    if(d>maxD){maxD=d;idx=i;}
  }
  if(maxD>eps){
    return [...rdp(pts.slice(0,idx+1),eps).slice(0,-1),...rdp(pts.slice(idx),eps)];
  }
  return [a,b];
}
function ptLineDist(p,a,b){
  const dx=b.x-a.x,dy=b.y-a.y;
  if(!dx&&!dy) return Math.hypot(p.x-a.x,p.y-a.y);
  const t=Math.max(0,Math.min(1,((p.x-a.x)*dx+(p.y-a.y)*dy)/(dx*dx+dy*dy)));
  return Math.hypot(p.x-a.x-t*dx,p.y-a.y-t*dy);
}

// Chaikin corner-cut smoothing
function chaikin(pts,n){
  let p=pts.map(q=>({...q}));
  for(let it=0;it<n;it++){
    const o=[p[0]];
    for(let i=0;i<p.length-1;i++){
      o.push({x:.75*p[i].x+.25*p[i+1].x,y:.75*p[i].y+.25*p[i+1].y});
      o.push({x:.25*p[i].x+.75*p[i+1].x,y:.25*p[i].y+.75*p[i+1].y});
    }
    o.push(p[p.length-1]);
    p=o;
  }
  return p;
}

// Catmull-Rom interpolation through pts → dense curve array {x,y,t}
function catmullRom(pts){
  if(pts.length<2) return pts.map((p,i)=>({...p,t:i/Math.max(1,pts.length-1)}));
  const out=[];
  const n=pts.length;
  for(let i=0;i<n-1;i++){
    const p0=pts[Math.max(i-1,0)];
    const p1=pts[i];
    const p2=pts[i+1];
    const p3=pts[Math.min(i+2,n-1)];
    const seg=Math.max(4,Math.round(Math.hypot(p2.x-p1.x,p2.y-p1.y)/1.5));
    for(let s=0;s<seg;s++){
      const u=s/seg,u2=u*u,u3=u2*u;
      out.push({
        x:.5*((2*p1.x)+(-p0.x+p2.x)*u+(2*p0.x-5*p1.x+4*p2.x-p3.x)*u2+(-p0.x+3*p1.x-3*p2.x+p3.x)*u3),
        y:.5*((2*p1.y)+(-p0.y+p2.y)*u+(2*p0.y-5*p1.y+4*p2.y-p3.y)*u2+(-p0.y+3*p1.y-3*p2.y+p3.y)*u3),
        t:(i+u)/(n-1)
      });
    }
  }
  out.push({...pts[n-1],t:1});
  return out;
}

function pressureAt(t,prof){
  if(prof==='taper') return Math.min(t*6,1)*Math.min((1-t)*6,1);
  if(prof==='swell') return .2+.8*Math.sin(t*Math.PI);
  return 1;
}

// Build outline polygon for variable-width stroke (used for render + SVG export)
function buildOutline(curvePts,size,pressure){
  const left=[],right=[];
  for(let i=0;i<curvePts.length;i++){
    const p=curvePts[i];
    const pr=pressureAt(p.t,pressure);
    const hw=(size/2)*Math.max(0.01,pr);
    const next=curvePts[Math.min(i+1,curvePts.length-1)];
    const prev=curvePts[Math.max(i-1,0)];
    const tx=next.x-prev.x, ty=next.y-prev.y;
    const len=Math.hypot(tx,ty)||1;
    const nx=-ty/len, ny=tx/len;
    left.push( {x:p.x+nx*hw,y:p.y+ny*hw});
    right.push({x:p.x-nx*hw,y:p.y-ny*hw});
  }
  return {left,right};
}

// Build a complete stroke object from raw points
function buildStroke(raw,opts){
  const eps=Math.max(1,opts.smooth*0.35);
  let ctrl=rdp(raw,eps);
  if(ctrl.length<2) ctrl=[raw[0],raw[raw.length-1]];
  ctrl=chaikin(ctrl,2);
  const curve=catmullRom(ctrl);
  return{ctrl,curve,color:opts.color,size:opts.size,opacity:opts.opacity,pressure:opts.pressure};
}

// Rebuild curve after editing control points (no re-simplify)
function rebuildCurve(s){
  s.curve=catmullRom(s.ctrl);
}

// ── Rendering ─────────────────────────────────────────────────────
function renderStroke(ctx,s,override){
  const pts=s.curve;
  if(!pts||pts.length<2) return;
  ctx.save();
  ctx.globalAlpha=s.opacity;
  const col=override||s.color;
  ctx.lineCap='round';
  ctx.lineJoin='round';

  if(s.pressure==='flat'){
    ctx.strokeStyle=col;
    ctx.lineWidth=s.size;
    ctx.beginPath();
    ctx.moveTo(pts[0].x,pts[0].y);
    for(let i=1;i<pts.length;i++) ctx.lineTo(pts[i].x,pts[i].y);
    ctx.stroke();
  } else {
    const {left,right}=buildOutline(pts,s.size,s.pressure);
    ctx.fillStyle=col;
    ctx.beginPath();
    ctx.moveTo(left[0].x,left[0].y);
    for(let i=1;i<left.length;i++) ctx.lineTo(left[i].x,left[i].y);
    for(let i=right.length-1;i>=0;i--) ctx.lineTo(right[i].x,right[i].y);
    ctx.closePath();
    ctx.fill();
  }
  ctx.restore();
}

function renderOverlay(){
  octx.clearRect(0,0,oc.width,oc.height);
  if(mode==='edit'&&selIdx>=0){
    const s=strokes[selIdx];
    // ghost the stroke in accent
    renderStroke(octx,s,'rgba(91,124,246,0.25)');
    // guide polygon
    octx.save();
    octx.strokeStyle='rgba(91,124,246,0.5)';
    octx.lineWidth=0.75;
    octx.setLineDash([3,4]);
    octx.beginPath();
    s.ctrl.forEach((p,i)=>i?octx.lineTo(p.x,p.y):octx.moveTo(p.x,p.y));
    octx.stroke();
    octx.setLineDash([]);
    // control points
    s.ctrl.forEach((p,i)=>{
      const sel=i===selPt;
      octx.beginPath();
      octx.arc(p.x,p.y,sel?8:5.5,0,Math.PI*2);
      octx.fillStyle=sel?'#5b7cf6':'rgba(255,255,255,0.1)';
      octx.fill();
      octx.strokeStyle=sel?'#8fa4ff':'rgba(91,124,246,0.85)';
      octx.lineWidth=1.5;
      octx.stroke();
    });
    octx.restore();
  }
  if(mode==='select'&&selIdx>=0){
    const s=strokes[selIdx];
    renderStroke(octx,s,'rgba(226,75,74,0.25)');
    const bb=bbox(s.ctrl);
    octx.save();
    octx.strokeStyle='#e24b4a';
    octx.lineWidth=1;
    octx.setLineDash([5,4]);
    octx.strokeRect(bb.x-8,bb.y-8,bb.w+16,bb.h+16);
    octx.setLineDash([]);
    [[bb.x-8,bb.y-8],[bb.x+bb.w+8,bb.y-8],[bb.x-8,bb.y+bb.h+8],[bb.x+bb.w+8,bb.y+bb.h+8]].forEach(([hx,hy])=>{
      octx.beginPath();octx.arc(hx,hy,3.5,0,Math.PI*2);
      octx.fillStyle='#e24b4a';octx.fill();
    });
    octx.restore();
  }
}

function redrawAll(){
  mctx.clearRect(0,0,mc.width,mc.height);
  strokes.forEach(s=>renderStroke(mctx,s));
  renderOverlay();
}

function bbox(pts){
  const xs=pts.map(p=>p.x),ys=pts.map(p=>p.y);
  const x=Math.min(...xs),y=Math.min(...ys);
  return{x,y,w:Math.max(...xs)-x,h:Math.max(...ys)-y};
}

// ── Pointer ───────────────────────────────────────────────────────
function pos(e){
  const r=mc.getBoundingClientRect();
  const s=e.touches?e.touches[0]:e;
  return{x:s.clientX-r.left,y:s.clientY-r.top};
}

mc.addEventListener('pointerdown',onDown);
mc.addEventListener('pointermove',onMove);
mc.addEventListener('pointerup',onUp);
mc.addEventListener('pointerleave',onUp);

function onDown(e){
  e.preventDefault();
  mc.setPointerCapture(e.pointerId);
  const p=pos(e);
  if(mode==='draw'){
    isDrawing=true; rawPts=[{...p}]; stabBuf=[{...p}]; redoStack=[];
  } else if(mode==='erase'){
    eraseAt(p);
  } else if(mode==='edit'){
    // try grab existing ctrl pt of selected stroke
    if(selIdx>=0){
      const ctrl=strokes[selIdx].ctrl;
      for(let i=0;i<ctrl.length;i++){
        if(Math.hypot(ctrl[i].x-p.x,ctrl[i].y-p.y)<12){
          selPt=i; isDragging=true; return;
        }
      }
    }
    // otherwise try to select a stroke
    selPt=-1; isDragging=false;
    selIdx=hitStroke(p);
    if(selIdx>=0) hint('Drag the blue dots to reshape · click elsewhere to deselect');
    renderOverlay(); updateStatus(); updateList();
  } else if(mode==='select'){
    selIdx=hitStroke(p);
    renderOverlay(); updateStatus(); updateList();
  }
}

function onMove(e){
  e.preventDefault();
  const p=pos(e);
  if(mode==='draw'&&isDrawing){
    const N=Math.max(1,B.stabilize);
    stabBuf.push({...p});
    if(stabBuf.length>N) stabBuf.shift();
    const sx=stabBuf.reduce((a,b)=>a+b.x,0)/stabBuf.length;
    const sy=stabBuf.reduce((a,b)=>a+b.y,0)/stabBuf.length;
    rawPts.push({x:sx,y:sy});
    // live preview
    mctx.clearRect(0,0,mc.width,mc.height);
    strokes.forEach(s=>renderStroke(mctx,s));
    if(rawPts.length>2){
      const prev=buildStroke(rawPts,{color:B.color,size:B.size,opacity:B.opacity,pressure:B.pressure,smooth:B.smooth});
      renderStroke(mctx,prev);
    }
  } else if(mode==='erase'&&e.buttons){
    eraseAt(p);
  } else if(mode==='edit'&&isDragging&&selIdx>=0&&selPt>=0){
    strokes[selIdx].ctrl[selPt]={x:p.x,y:p.y};
    rebuildCurve(strokes[selIdx]);
    mctx.clearRect(0,0,mc.width,mc.height);
    strokes.forEach(s=>renderStroke(mctx,s));
    renderOverlay();
  }
}

function onUp(e){
  if(mode==='draw'&&isDrawing){
    isDrawing=false;
    if(rawPts.length>=2){
      strokes.push(buildStroke(rawPts,{color:B.color,size:B.size,opacity:B.opacity,pressure:B.pressure,smooth:B.smooth}));
    }
    rawPts=[]; stabBuf=[];
    redrawAll(); updateList(); updateStatus();
  }
  if(mode==='edit'&&isDragging){
    isDragging=false; selPt=-1;
    redrawAll(); updateList();
  }
}

function hitStroke(p){
  for(let i=strokes.length-1;i>=0;i--){
    const s=strokes[i];
    const pad=Math.max(8,s.size/2+5);
    for(let j=0;j<s.curve.length;j+=3){
      if(Math.hypot(s.curve[j].x-p.x,s.curve[j].y-p.y)<pad) return i;
    }
  }
  return -1;
}

function eraseAt(p){
  const h=hitStroke(p);
  if(h>=0){
    redoStack=[];
    strokes.splice(h,1);
    if(selIdx>=strokes.length) selIdx=-1;
    redrawAll(); updateList(); updateStatus();
  }
}

function f(n){return n.toFixed(2);}

let hintTimer;
function hint(msg){
  const el=document.getElementById('ehint');
  el.textContent=msg; el.classList.add('show');
  clearTimeout(hintTimer);
  hintTimer=setTimeout(()=>el.classList.remove('show'),3500);
}

function updateStatus(){
  document.getElementById('b-mode').textContent=mode;
  document.getElementById('b-count').textContent=strokes.length;
  const s=selIdx>=0?strokes[selIdx]:null;
  document.getElementById('b-sel').textContent=s?`#${selIdx+1} · ${s.ctrl.length} ctrl pts`:'—';
}

function updateList(){
  const list=document.getElementById('slist');
  list.querySelectorAll('.si').forEach(e=>e.remove());
  const empty=document.getElementById('sempty');
  if(!strokes.length){empty.style.display='';return;}
  empty.style.display='none';
  strokes.slice().reverse().forEach((s,ri)=>{
    const i=strokes.length-1-ri;
    const el=document.createElement('div');
    el.className='si'+(i===selIdx?' on':'');
    const sz=Math.min(14,s.size+2);
    el.innerHTML=`<div class="sdot" style="width:${sz}px;height:${sz}px;background:${s.color}"></div>
      <div class="smeta">#${i+1} · ${s.ctrl.length}pts · ${s.pressure}</div>
      <button class="sdel" onclick="_delStroke(${i},event)">×</button>`;
    el.addEventListener('click',()=>{
      selIdx=i;
      if(mode!=='edit'&&mode!=='select') _setMode('edit');
      else{renderOverlay();updateStatus();updateList();}
    });
    list.appendChild(el);
  });
}

document.addEventListener('keydown',e=>{
  if(e.target.tagName==='INPUT') return;
  if((e.ctrlKey||e.metaKey)&&!e.shiftKey&&e.key.toLowerCase()==='z'){e.preventDefault();_undo();}
  if((e.ctrlKey||e.metaKey)&&e.shiftKey&&e.key.toLowerCase()==='z'){e.preventDefault();_redo();}
  if(e.key==='Delete'||e.key==='Backspace'){if(selIdx>=0)_delStroke(selIdx,{stopPropagation:()=>{}});}
  if(!e.ctrlKey&&!e.metaKey){
    if(e.key==='d') _setMode('draw');
    if(e.key==='e') _setMode('edit');
    if(e.key==='s') _setMode('select');
    if(e.key==='x') _setMode('erase');
  }
});

// ── Expose real implementations to the stub globals in <head> ────
function _setMode(m){
  mode=m;
  ['draw','edit','select','erase'].forEach(x=>{
    const b=document.getElementById('m-'+x);
    if(b) b.classList.toggle('on',x===m);
  });
  mc.style.cursor=m==='draw'?'crosshair':m==='erase'?'cell':'default';
  if(m==='draw'||m==='erase'){selIdx=-1;selPt=-1;}
  if(m==='edit'&&selIdx<0) hint('Click a stroke to select it, then drag its points');
  redrawAll(); updateStatus();
}
function _setColor(c){
  B.color=c;
  document.getElementById('hexlbl').textContent=c;
  document.getElementById('cp').value=c;
  document.querySelectorAll('.cs').forEach((el,i)=>el.classList.toggle('on',PALETTE[i]===c));
}
function _undo(){if(!strokes.length)return;redoStack.push(strokes.pop());selIdx=-1;selPt=-1;redrawAll();updateList();updateStatus();}
function _redo(){if(!redoStack.length)return;strokes.push(redoStack.pop());redrawAll();updateList();updateStatus();}
function _clearAll(){if(!strokes.length)return;redoStack=[...strokes];strokes=[];selIdx=-1;selPt=-1;redrawAll();updateList();updateStatus();}
function _exportSVG(){
  const W=mc.width,H=mc.height;
  const els=strokes.map(s=>{
    const pts=s.curve;
    if(!pts||pts.length<2) return '';
    if(s.pressure==='flat'){
      let d=`M${f(pts[0].x)},${f(pts[0].y)}`;
      for(let i=1;i<pts.length;i++) d+=` L${f(pts[i].x)},${f(pts[i].y)}`;
      return `<path d="${d}" stroke="${s.color}" stroke-width="${s.size}" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="${s.opacity}"/>`;
    } else {
      const{left,right}=buildOutline(pts,s.size,s.pressure);
      const poly=[...left,...right.reverse()].map(p=>`${f(p.x)},${f(p.y)}`).join(' ');
      return `<polygon points="${poly}" fill="${s.color}" opacity="${s.opacity}"/>`;
    }
  }).join('\n  ');
  const svg=`<svg xmlns="http://www.w3.org/2000/svg" width="${W}" height="${H}" viewBox="0 0 ${W} ${H}">\n  ${els}\n</svg>`;
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([svg],{type:'image/svg+xml'}));
  a.download='brush.svg'; a.click();
}
function _toggleBg(){darkBg=!darkBg;cwrap.classList.toggle('dark',darkBg);}
function _delStroke(i,e){
  e.stopPropagation(); redoStack=[];
  strokes.splice(i,1);
  if(selIdx>=strokes.length) selIdx=-1;
  redrawAll(); updateList(); updateStatus();
}

window._setMode=_setMode; window._setColor=_setColor;
window._undo=_undo; window._redo=_redo;
window._clearAll=_clearAll; window._exportSVG=_exportSVG;
window._toggleBg=_toggleBg; window._delStroke=_delStroke;

// Remove duplicate internal functions now replaced above
updateStatus();
</script>
